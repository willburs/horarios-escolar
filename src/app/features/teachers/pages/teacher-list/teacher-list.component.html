<div class="page">

  <div class="page-header">
    <h1>Maestros</h1>
    <button mat-raised-button color="primary" (click)="nuevo()">
      <mat-icon>add</mat-icon>
      Nuevo Maestro
    </button>
  </div>

  <mat-card>
    <mat-card-content>

      @if(teachers.length === 0) {
        <p class="empty">No hay maestros registrados.</p>
      } @else {
        <table mat-table [dataSource]="teachers" class="full-width">

          <ng-container matColumnDef="nombre">
            <th mat-header-cell *matHeaderCellDef>Nombre</th>
            <td mat-cell *matCellDef="let t">{{ t.nombre }}</td>
          </ng-container>

          <ng-container matColumnDef="materia">
            <th mat-header-cell *matHeaderCellDef>Materia</th>
            <td mat-cell *matCellDef="let t">{{ t.materia }}</td>
          </ng-container>

          <ng-container matColumnDef="turno">
            <th mat-header-cell *matHeaderCellDef>Turno</th>
            <td mat-cell *matCellDef="let t">{{ t.turno }}</td>
          </ng-container>

          <ng-container matColumnDef="horas">
            <th mat-header-cell *matHeaderCellDef>Horas/Sem</th>
            <td mat-cell *matCellDef="let t">{{ t.horasSemana }}</td>
          </ng-container>

          <ng-container matColumnDef="grados">
            <th mat-header-cell *matHeaderCellDef>Grados</th>
            <td mat-cell *matCellDef="let t">
              @for(g of t.grados; track g) {
                <mat-chip>{{ g }}°</mat-chip>
              }
            </td>
          </ng-container>

          <ng-container matColumnDef="acciones">
            <th mat-header-cell *matHeaderCellDef></th>
            <td mat-cell *matCellDef="let t">
              <button mat-icon-button color="primary"
                (click)="verDisponibilidad(t.id)"
                matTooltip="Disponibilidad">
                <mat-icon>schedule</mat-icon>
              </button>
              <button mat-icon-button color="warn"
                (click)="eliminar(t.id)"
                matTooltip="Eliminar">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        </table>
      }

    </mat-card-content>
  </mat-card>

</div>
