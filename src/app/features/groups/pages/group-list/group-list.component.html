<div class="page">
  <div class="page-header">
    <h1>Grupos</h1>
    <button mat-raised-button color="primary" (click)="nuevo()">
      <mat-icon>add</mat-icon>
      Nuevo Grupo
    </button>
  </div>
  <mat-card>
    <mat-card-content>
      @if(groups.length === 0) {
        <p class="empty">No hay grupos registrados.</p>
      } @else {
        <table mat-table [dataSource]="groups" class="full-width">

          <ng-container matColumnDef="nombre">
            <th mat-header-cell *matHeaderCellDef>Grupo</th>
            <td mat-cell *matCellDef="let g">
              <strong>{{ g.nombre }}</strong>
            </td>
          </ng-container>

          <ng-container matColumnDef="grado">
            <th mat-header-cell *matHeaderCellDef>Grado</th>
            <td mat-cell *matCellDef="let g">{{ g.grado }}°</td>
          </ng-container>

          <ng-container matColumnDef="turno">
            <th mat-header-cell *matHeaderCellDef>Turno</th>
            <td mat-cell *matCellDef="let g">
              <mat-chip>{{ g.turno }}</mat-chip>
            </td>
          </ng-container>

          <ng-container matColumnDef="acciones">
            <th mat-header-cell *matHeaderCellDef></th>
            <td mat-cell *matCellDef="let g">
              <button mat-icon-button color="warn"
                (click)="eliminar(g.id)"
                matTooltip="Eliminar">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        </table>
      }
    </mat-card-content>
  </mat-card>
</div>
