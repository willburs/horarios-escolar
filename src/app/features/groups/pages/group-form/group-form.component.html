<div class="page">
  <mat-card>

    <mat-card-header>
      <mat-card-title>Nuevo Grupo</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Grado</mat-label>
          <mat-select formControlName="grado">
            <mat-option [value]="1">1°</mat-option>
            <mat-option [value]="2">2°</mat-option>
            <mat-option [value]="3">3°</mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Letra</mat-label>
          <mat-select formControlName="letra">
            <mat-option value="A">A</mat-option>
            <mat-option value="B">B</mat-option>
            <mat-option value="C">C</mat-option>
            <mat-option value="D">D</mat-option>
            <mat-option value="E">E</mat-option>
            <mat-option value="F">F</mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Turno</mat-label>
          <mat-select formControlName="turno">
            <mat-option value="MATUTINO">Matutino</mat-option>
            <mat-option value="VESPERTINO">Vespertino</mat-option>
          </mat-select>
        </mat-form-field>

      </form>
    </mat-card-content>

    <mat-card-actions align="end">
      <button mat-button (click)="cancelar()">Cancelar</button>
      <button mat-raised-button color="primary"
        (click)="guardar()"
        [disabled]="saving">
        {{ saving ? 'Guardando...' : 'Guardar Grupo' }}
      </button>
    </mat-card-actions>

  </mat-card>
</div>
