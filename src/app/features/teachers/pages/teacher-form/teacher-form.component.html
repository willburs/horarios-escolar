<div class="page">

  <mat-card>

    <mat-card-header>
      <mat-card-title>Nuevo Maestro</mat-card-title>
    </mat-card-header>

    <mat-card-content>

      <form [formGroup]="form">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Nombre completo</mat-label>
          <input matInput formControlName="nombre">
          <mat-error>Campo requerido</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Materia que imparte</mat-label>
          <input matInput formControlName="materia">
          <mat-error>Campo requerido</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Turno</mat-label>
          <mat-select formControlName="turno">
            <mat-option value="MATUTINO">Matutino</mat-option>
            <mat-option value="VESPERTINO">Vespertino</mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Horas por semana</mat-label>
          <input matInput type="number" formControlName="horasSemana">
          <mat-error>Mínimo 1 hora</mat-error>
        </mat-form-field>

        <div class="grados-group">
          <label class="grados-label">Grados que imparte</label>
          <div class="grados">
            <mat-checkbox formControlName="grado1">1°</mat-checkbox>
            <mat-checkbox formControlName="grado2">2°</mat-checkbox>
            <mat-checkbox formControlName="grado3">3°</mat-checkbox>
          </div>
        </div>

      </form>

    </mat-card-content>

    <mat-card-actions align="end">
      <button mat-button (click)="cancelar()">Cancelar</button>
      <button mat-raised-button color="primary"
        (click)="guardar()"
        [disabled]="saving">
        {{ saving ? 'Guardando...' : 'Guardar Maestro' }}
      </button>
    </mat-card-actions>

  </mat-card>

</div>
