<div class="page">
  <div class="page-header">
    <h1>Asignaciones</h1>
    <button mat-raised-button color="primary" (click)="nuevo()">
      <mat-icon>add</mat-icon>
      Nueva Asignación
    </button>
  </div>

  <mat-card>
    <mat-card-content>
      @if(assignments.length === 0) {
        <p class="empty">No hay asignaciones registradas.</p>
      } @else {
        <table mat-table [dataSource]="assignments" class="full-width">

          <ng-container matColumnDef="maestro">
            <th mat-header-cell *matHeaderCellDef>Maestro</th>
            <td mat-cell *matCellDef="let a">{{ a.teacherName }}</td>
          </ng-container>

          <ng-container matColumnDef="materia">
            <th mat-header-cell *matHeaderCellDef>Materia</th>
            <td mat-cell *matCellDef="let a">{{ a.teacherMateria }}</td>
          </ng-container>

          <ng-container matColumnDef="grupo">
            <th mat-header-cell *matHeaderCellDef>Grupo</th>
            <td mat-cell *matCellDef="let a">{{ a.groupName }}</td>
          </ng-container>

          <ng-container matColumnDef="horas">
            <th mat-header-cell *matHeaderCellDef>Horas/Sem</th>
            <td mat-cell *matCellDef="let a">{{ a.horasSemana }}</td>
          </ng-container>

          <ng-container matColumnDef="acciones">
            <th mat-header-cell *matHeaderCellDef></th>
            <td mat-cell *matCellDef="let a">
              <button mat-icon-button color="warn"
                (click)="eliminar(a.id)"
                matTooltip="Eliminar">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        </table>
      }
    </mat-card-content>
  </mat-card>
</div>
